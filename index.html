<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Impresiones</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .calc-box { border: 1px solid #ccc; padding: 20px; max-width: 400px; border-radius: 8px; }
        input { width: 100%; padding: 8px; margin: 10px 0; }
        button { background: #28a745; color: white; padding: 10px; border: none; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

<div class="calc-box">
    <h2>Calculadora de Precios</h2>
    <label>Número de páginas:</label>
    <input type="number" id="paginas" placeholder="Ej: 279">
    
    <button onclick="calcular()">Calcular Precio</button>
    
    <h3>Total a pagar: <span id="resultado">$0</span></h3>
</div>

<script>
function calcular() {
    // Variables base
    const numPaginas = document.getElementById('paginas').value;
    const costoTonerPorPagina = 8.96;
    const costoPapelPorHoja = 8.00;
    const costoTapas = 200;
    const costoAnillo = 100;
    
    // Cálculos
    const hojas = Math.ceil(numPaginas / 2);
    const costoMateriales = (numPaginas * costoTonerPorPagina) + (hojas * costoPapelPorHoja) + costoTapas + costoAnillo;
    const costoConDesgaste = costoMateriales * 1.10;
    const precioFinal = costoConDesgaste * 2; // 100% ganancia
    
    document.getElementById('resultado').innerText = "$" + Math.round(precioFinal);
}
</script>

</body>
</html>
