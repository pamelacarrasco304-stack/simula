<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cotiza tu Impresión</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #EDDEE0; padding: 20px; display: flex; justify-content: center; }
        .calc-box { background-color: #ffffff; padding: 30px; max-width: 400px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        h2 { color: #36445D; }
        label { display: block; margin-top: 10px; color: #36445D; font-weight: bold; text-align: left; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #EDDEE0; border-radius: 10px; box-sizing: border-box; }
        button { background-color: #03627E; color: white; padding: 12px; border: none; width: 100%; border-radius: 10px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background-color: #DC8079; }
        #resultado { font-size: 32px; font-weight: bold; color: #03627E; margin-top: 15px; display: block; }
    </style>
</head>
<body>

<div class="calc-box">
    <h2>Cotiza tu Impresión</h2>
    
    <label>Número de páginas:</label>
    <input type="number" id="paginas" placeholder="Ej: 50">
    
    <label>Tipo de impresión:</label>
    <select id="tipoImpresion">
        <option value="bn">Blanco y Negro</option>
        <option value="color">Color</option>
    </select>
    
    <label><input type="checkbox" id="conAnillado"> Incluir Anillado</label>
    
    <button onclick="calcular()">Calcular Presupuesto</button>
    
    <span id="resultado">$0</span>
</div>

<script>
function calcular() {
    const totalPaginas = parseInt(document.getElementById('paginas').value);
    const esColor = document.getElementById('tipoImpresion').value === 'color';
    const conAnillado = document.getElementById('conAnillado').checked;
    
    if (!totalPaginas || totalPaginas <= 0) return;

    let precioFinal;

    if (!conAnillado) {
        // Lógica sin anillado: Precio fijo por hoja
        precioFinal = totalPaginas * (esColor ? 150 : 100);
    } else {
        // Lógica con anillado: Cálculo detallado
        const hojas = Math.ceil(totalPaginas / 2);
        const costoBase = (totalPaginas * 2) + (hojas * 10) + 300 + 303; // Tinta, Papel, Anillos, Micas
        const costoConMargenes = costoBase * 1.15; // 5% error + 5% elec + 5% desgaste
        const precioConGanancia = costoConMargenes * 2; // 100% ganancia
        const precioConIva = precioConGanancia * 1.19;
        
        // Sumar plus por color
        precioFinal = Math.ceil(precioConIva / 100) * 100;
        if (esColor) precioFinal += 1000;
        
        // Aplicar mínimo de $3.500 para anillados
        if (precioFinal < 3500) precioFinal = 3500;
    }

    document.getElementById('resultado').innerText = "$" + precioFinal;
}
</script>
</body>
</html>
