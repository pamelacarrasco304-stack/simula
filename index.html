<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cotizador Profesional</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #EDDEE0; padding: 20px; display: flex; justify-content: center; }
        .calc-box { background-color: #ffffff; padding: 30px; max-width: 400px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        h2 { color: #36445D; }
        label { display: block; margin-top: 10px; color: #36445D; font-weight: bold; text-align: left; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #EDDEE0; border-radius: 10px; box-sizing: border-box; }
        button { background-color: #03627E; color: white; padding: 12px; border: none; width: 100%; border-radius: 10px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background-color: #DC8079; }
        #resultado { font-size: 28px; font-weight: bold; color: #03627E; }
        #historial { margin-top: 20px; text-align: left; font-size: 14px; border-top: 1px solid #ccc; padding-top: 10px; }
        .footer { margin-top: 20px; font-size: 14px; color: #36445D; font-style: italic; }
    </style>
</head>
<body>

<div class="calc-box">
    <h2>Cotizador de Servicios</h2>
    
    <label>Número de páginas:</label>
    <input type="number" id="paginas" placeholder="Ej: 70">
    
    <label>Tipo de impresión:</label>
    <select id="tipoImpresion">
        <option value="1.5">Blanco y Negro ($1.5 c/pág)</option>
        <option value="15">Color ($15 c/pág)</option>
    </select>
    
    <label><input type="checkbox" id="conAnillado" checked> Incluir Anillado</label>
    
    <button onclick="calcular()">Calcular Presupuesto</button>
    
    <h3>Total: <span id="resultado">$0</span></h3>
    
    <div id="historial">
        <h4>Consultas recientes:</h4>
        <ul id="listaHistorial"></ul>
    </div>
    
    <div class="footer">
        <p>¡Gracias por preferir nuestro servicio!</p>
    </div>
</div>

<script>
function calcular() {
    const totalPaginas = parseInt(document.getElementById('paginas').value);
    const costoTintaPorPagina = parseFloat(document.getElementById('tipoImpresion').value);
    const conAnillado = document.getElementById('conAnillado').checked;
    
    if (!totalPaginas || totalPaginas <= 0) return;
    
    const hojasCapacidad = Math.ceil(totalPaginas / 2);
    const costoPapelPorHoja = 8.00;
    const margenErrorPorPagina = 15.0;
    
    const costoMicas = conAnillado ? 303.32 : 0;
    let costoAnillo = 0;
    
    if (conAnillado) {
        if (hojasCapacidad <= 80) costoAnillo = 139;
        else if (hojasCapacidad <= 95) costoAnillo = 170;
        else if (hojasCapacidad <= 105) costoAnillo = 208;
        else if (hojasCapacidad <= 120) costoAnillo = 238;
        else if (hojasCapacidad <= 140) costoAnillo = 294;
        else if (hojasCapacidad <= 170) costoAnillo = 354;
        else costoAnillo = 400;
    }
    
    const costoDirecto = (totalPaginas * (costoTintaPorPagina + margenErrorPorPagina)) + 
                         (hojasCapacidad * costoPapelPorHoja) + 
                         costoMicas + costoAnillo;
                         
    const precioFinal = Math.ceil((costoDirecto * 1.50 * 1.19) / 100) * 100;
    
    document.getElementById('resultado').innerText = "$" + precioFinal;
    
    const lista = document.getElementById('listaHistorial');
    const item = document.createElement('li');
    item.innerText = `${totalPaginas} págs (${conAnillado ? 'Con' : 'Sin'} anillo): $${precioFinal}`;
    lista.prepend(item);
}
</script>

</body>
</html>
